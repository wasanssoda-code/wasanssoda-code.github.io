<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>쌈뽕한 권대은 꼬추클릭커</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #101114;
      --panel: #1a1d24;
      --panel-2: #222732;
      --line: #343b49;
      --text: #f4f0e8;
      --muted: #b8b1a5;
      --gold: #ffd36d;
      --mint: #76e4b3;
      --rose: #ff8fa3;
      --sky: #7cc7ff;
      --shadow: rgba(0, 0, 0, .34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at 18% 12%, rgba(255, 211, 109, .12), transparent 28rem),
        radial-gradient(circle at 88% 22%, rgba(124, 199, 255, .14), transparent 24rem),
        linear-gradient(135deg, #101114, #17191f 58%, #11151a);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    main {
      width: min(1060px, 100%);
      display: grid;
      grid-template-columns: minmax(280px, 1fr) 360px;
      gap: 18px;
      align-items: stretch;
    }

    .stage,
    .shop {
      background: rgba(26, 29, 36, .88);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 24px 70px var(--shadow);
      overflow: hidden;
    }

    .stage {
      min-height: 620px;
      display: grid;
      grid-template-rows: auto 1fr auto;
      position: relative;
    }

    header {
      padding: 22px 24px 10px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: flex-start;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.8rem, 4vw, 3.2rem);
      line-height: .98;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 9px 0 0;
      color: var(--muted);
      font-size: .98rem;
    }

    .badge {
      flex: 0 0 auto;
      display: grid;
      place-items: center;
      min-width: 94px;
      padding: 10px 12px;
      border: 1px solid #4a5261;
      background: #171a21;
      border-radius: 8px;
      color: var(--gold);
      font-weight: 800;
      text-align: center;
    }

    .counter {
      display: grid;
      place-items: center;
      gap: 20px;
      padding: 20px 24px 30px;
      text-align: center;
    }

    .score {
      display: grid;
      gap: 5px;
    }

    .score strong {
      font-size: clamp(3rem, 10vw, 6.8rem);
      line-height: .85;
      font-variant-numeric: tabular-nums;
      color: var(--gold);
      text-shadow: 0 5px 0 rgba(0, 0, 0, .18);
    }

    .score span {
      color: var(--muted);
      font-size: 1.05rem;
    }

    .orb-wrap {
      position: relative;
      width: min(520px, 88vw);
      aspect-ratio: 615 / 210;
      display: grid;
      place-items: center;
    }

    .click-orb {
      width: 100%;
      aspect-ratio: 615 / 210;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      background: transparent;
      box-shadow:
        0 18px 0 #080b0e,
        0 34px 46px rgba(0, 0, 0, .42);
      transform: translateY(-8px);
      transition: transform .07s ease, box-shadow .07s ease, filter .2s ease;
      padding: 0;
    }

    .click-orb:hover {
      filter: brightness(1.07);
    }

    .click-orb:active,
    .click-orb.pressed {
      transform: translateY(5px) scale(.98);
      box-shadow:
        0 6px 0 #080b0e,
        0 16px 28px rgba(0, 0, 0, .42);
    }

    .face-sprite {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
      filter: drop-shadow(0 13px 12px rgba(0, 0, 0, .42)) contrast(1.08) saturate(.9);
    }

    .photo-noise {
      mix-blend-mode: multiply;
      opacity: .13;
    }

    .spark {
      position: absolute;
      pointer-events: none;
      color: var(--gold);
      font-weight: 900;
      text-shadow: 0 2px 8px rgba(0, 0, 0, .5);
      animation: rise .8s ease forwards;
      user-select: none;
    }

    @keyframes rise {
      from {
        transform: translate(-50%, -30%) scale(.9);
        opacity: 1;
      }
      to {
        transform: translate(-50%, -145%) scale(1.22);
        opacity: 0;
      }
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--line);
      border-top: 1px solid var(--line);
    }

    .stat {
      background: rgba(18, 20, 25, .74);
      padding: 15px 12px;
      min-width: 0;
    }

    .stat span {
      display: block;
      color: var(--muted);
      font-size: .78rem;
      margin-bottom: 5px;
    }

    .stat strong {
      font-size: 1.16rem;
      font-variant-numeric: tabular-nums;
    }

    .shop {
      display: grid;
      grid-template-rows: auto 1fr auto;
      min-height: 620px;
    }

    .shop-head {
      padding: 21px 18px 15px;
      border-bottom: 1px solid var(--line);
    }

    .shop-head h2 {
      margin: 0;
      font-size: 1.35rem;
      letter-spacing: 0;
    }

    .shop-head p {
      margin: 7px 0 0;
      color: var(--muted);
      font-size: .92rem;
    }

    .upgrades {
      padding: 14px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .upgrade {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel-2);
      color: var(--text);
      padding: 14px;
      display: grid;
      grid-template-columns: 42px 1fr auto;
      gap: 12px;
      align-items: center;
      cursor: pointer;
      text-align: left;
      transition: border-color .16s ease, transform .16s ease, background .16s ease;
    }

    .upgrade:hover {
      border-color: #59657a;
      transform: translateY(-1px);
      background: #262c38;
    }

    .upgrade:disabled {
      cursor: not-allowed;
      opacity: .55;
      transform: none;
    }

    .icon {
      width: 42px;
      aspect-ratio: 1;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-size: 1.32rem;
      background: #141820;
      border: 1px solid #394253;
    }

    .upgrade h3 {
      margin: 0 0 5px;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .upgrade p {
      margin: 0;
      color: var(--muted);
      font-size: .82rem;
      line-height: 1.35;
    }

    .price {
      color: var(--gold);
      font-weight: 900;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .footer-actions {
      border-top: 1px solid var(--line);
      padding: 14px;
      display: flex;
      gap: 10px;
    }

    .action {
      flex: 1;
      border: 1px solid var(--line);
      background: #151922;
      color: var(--text);
      border-radius: 8px;
      min-height: 42px;
      font-weight: 800;
      cursor: pointer;
    }

    .action:hover {
      border-color: #59657a;
    }

    @media (max-width: 820px) {
      body {
        padding: 12px;
        place-items: start center;
      }

      main {
        grid-template-columns: 1fr;
      }

      .stage,
      .shop {
        min-height: auto;
      }

      header {
        padding: 18px 16px 8px;
      }

      .counter {
        padding: 12px 16px 22px;
      }

      .stats {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <section class="stage" aria-label="게임 화면">
      <header>
        <div>
          <h1>쌈뽕한<br>권대은<br>꼬추클릭커</h1>
          <p class="subtitle">권대은의 대가리를 때려 스빵이를 얻으세요!</p>
        </div>
        <div class="badge" id="rank">견습</div>
      </header>

      <section class="counter">
        <div class="score">
          <strong id="score">0</strong>
          <span>스빵이</span>
        </div>
        <div class="orb-wrap" id="orbWrap">
          <button class="click-orb" id="clickOrb" aria-label="스빵이 만들기">
            <img class="face-sprite" src="click-sprite.png" alt="클릭 스프라이트">
          </button>
        </div>
      </section>

      <section class="stats" aria-label="현재 능력치">
        <div class="stat">
          <span>클릭당</span>
          <strong id="perClick">1</strong>
        </div>
        <div class="stat">
          <span>초당 자동 생산</span>
          <strong id="perSecond">0</strong>
        </div>
        <div class="stat">
          <span>총 클릭</span>
          <strong id="totalClicks">0</strong>
        </div>
      </section>
    </section>

    <aside class="shop" aria-label="업그레이드 상점">
      <div class="shop-head">
        <h2>업그레이드</h2>
        <p>알아서 사셈 ㅋ</p>
      </div>
      <div class="upgrades" id="upgrades"></div>
      <div class="footer-actions">
        <button class="action" id="saveButton">저장</button>
        <button class="action" id="resetButton">초기화</button>
      </div>
    </aside>
  </main>

  <script>
    const saveKey = "spark-workshop-clicker-v1";
    const upgrades = [
      {
        id: "tap",
        icon: "✦",
        name: "쫑쫑",
        desc: "클릭당 스빵이 +1",
        baseCost: 15,
        costRate: 1.45,
        apply: state => state.perClick += 1
      },
      {
        id: "bench",
        icon: "⚙",
        name: "임성빈",
        desc: "초당 스빵이 +1",
        baseCost: 65,
        costRate: 1.5,
        apply: state => state.perSecond += 1
      },
      {
        id: "lens",
        icon: "◆",
        name: "박수오",
        desc: "클릭당 스빵이 +5",
        baseCost: 240,
        costRate: 1.62,
        apply: state => state.perClick += 5
      },
      {
        id: "crew",
        icon: "★",
        name: "권대은",
        desc: "초당 스빵이 +8",
        baseCost: 900,
        costRate: 1.68,
        apply: state => state.perSecond += 8
      },
      {
        id: "hyunsu",
        icon: "☄",
        name: "현수",
        desc: "초당 스빵이 +20",
        baseCost: 2400,
        costRate: 1.72,
        apply: state => state.perSecond += 20
      },
      {
        id: "sungjun",
        icon: "✹",
        name: "임성준",
        desc: "클릭당 스빵이 +20",
        baseCost: 4200,
        costRate: 1.76,
        apply: state => state.perClick += 20
      },
      {
        id: "hebeu",
        icon: "✺",
        name: "헤브",
        desc: "클릭당 스빵이 +80, 초당 +80",
        baseCost: 15000,
        costRate: 1.85,
        apply: state => {
          state.perClick += 80;
          state.perSecond += 80;
        }
      },
      {
        id: "minjae",
        icon: "♡",
        name: "민재",
        desc: "그냥 기부임",
        baseCost: 50000,
        costRate: 2,
        apply: () => {}
      }
    ];

    const defaultState = {
      sparks: 0,
      perClick: 1,
      perSecond: 0,
      totalClicks: 0,
      owned: Object.fromEntries(upgrades.map(item => [item.id, 0]))
    };

    let state = loadGame();
    let lastTick = performance.now();

    const scoreEl = document.querySelector("#score");
    const perClickEl = document.querySelector("#perClick");
    const perSecondEl = document.querySelector("#perSecond");
    const totalClicksEl = document.querySelector("#totalClicks");
    const rankEl = document.querySelector("#rank");
    const orb = document.querySelector("#clickOrb");
    const orbWrap = document.querySelector("#orbWrap");
    const upgradeList = document.querySelector("#upgrades");
    const saveButton = document.querySelector("#saveButton");
    const resetButton = document.querySelector("#resetButton");
    const upgradeButtons = new Map();

    function formatNumber(value) {
      if (value < 1000) return Math.floor(value).toLocaleString("ko-KR");
      if (value < 1000000) return `${(value / 1000).toFixed(1)}천`;
      if (value < 1000000000) return `${(value / 1000000).toFixed(1)}백만`;
      return `${(value / 1000000000).toFixed(1)}십억`;
    }

    function getCost(item) {
      return Math.floor(item.baseCost * Math.pow(item.costRate, state.owned[item.id]));
    }

    function getRank() {
      if (state.sparks >= 100000) return "전설";
      if (state.sparks >= 25000) return "장인";
      if (state.sparks >= 5000) return "숙련";
      if (state.sparks >= 750) return "기술자";
      return "견습";
    }

    function loadGame() {
      const saved = localStorage.getItem(saveKey);
      if (!saved) return structuredClone(defaultState);
      try {
        return { ...structuredClone(defaultState), ...JSON.parse(saved) };
      } catch {
        return structuredClone(defaultState);
      }
    }

    function saveGame() {
      localStorage.setItem(saveKey, JSON.stringify(state));
      saveButton.textContent = "저장됨";
      setTimeout(() => saveButton.textContent = "저장", 800);
    }

    function renderUpgrades() {
      upgrades.forEach(item => {
        const cost = getCost(item);
        let button = upgradeButtons.get(item.id);
        if (!button) {
          button = document.createElement("button");
          button.className = "upgrade";
          button.addEventListener("click", () => buyUpgrade(item));
          upgradeButtons.set(item.id, button);
          upgradeList.append(button);
        }
        button.disabled = state.sparks < cost;
        button.innerHTML = `
          <span class="icon" aria-hidden="true">${item.icon}</span>
          <span>
            <h3>${item.name} <small>x${state.owned[item.id]}</small></h3>
            <p>${item.desc}</p>
          </span>
          <span class="price">${formatNumber(cost)}</span>
        `;
      });
    }

    function render() {
      scoreEl.textContent = formatNumber(state.sparks);
      perClickEl.textContent = formatNumber(state.perClick);
      perSecondEl.textContent = formatNumber(state.perSecond);
      totalClicksEl.textContent = formatNumber(state.totalClicks);
      rankEl.textContent = getRank();
      renderUpgrades();
    }

    function popSpark(amount, x, y) {
      const spark = document.createElement("span");
      spark.className = "spark";
      spark.textContent = `+${formatNumber(amount)}`;
      spark.style.left = `${x}px`;
      spark.style.top = `${y}px`;
      orbWrap.append(spark);
      spark.addEventListener("animationend", () => spark.remove());
    }

    function clickOrb(event) {
      state.sparks += state.perClick;
      state.totalClicks += 1;
      const rect = orbWrap.getBoundingClientRect();
      popSpark(
        state.perClick,
        event.clientX - rect.left,
        event.clientY - rect.top
      );
      orb.classList.add("pressed");
      setTimeout(() => orb.classList.remove("pressed"), 80);
      render();
    }

    function buyUpgrade(item) {
      const cost = getCost(item);
      if (state.sparks < cost) return;
      state.sparks -= cost;
      state.owned[item.id] += 1;
      item.apply(state);
      render();
    }

    function loop(now) {
      const seconds = (now - lastTick) / 1000;
      lastTick = now;
      if (state.perSecond > 0) {
        state.sparks += state.perSecond * seconds;
      }
      render();
      requestAnimationFrame(loop);
    }

    orb.addEventListener("click", clickOrb);
    saveButton.addEventListener("click", saveGame);
    resetButton.addEventListener("click", () => {
      if (!confirm("진행 상황을 초기화할까요?")) return;
      state = structuredClone(defaultState);
      localStorage.removeItem(saveKey);
      render();
    });

    window.addEventListener("keydown", event => {
      if (event.code === "Space") {
        event.preventDefault();
        orb.click();
      }
    });

    setInterval(saveGame, 15000);
    render();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
